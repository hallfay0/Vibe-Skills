<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">任务模块和本地 Skills 的匹配关系</title>
  <desc id="desc">VibeSkills 先看任务的不同部分，再按实际需要连接合适的本地 Skills；不需要专门 Skill 的工作继续由当前 AI 完成。</desc>

  <rect width="1200" height="540" fill="#FAFBF7"/>

  <g font-family="Noto Sans SC, Microsoft YaHei UI, sans-serif" text-anchor="middle" fill="#0F4C4E">
    <text x="200" y="61" font-size="19" font-weight="700">任务的不同部分</text>
    <text x="600" y="61" font-size="19" font-weight="700">按实际需要匹配</text>
    <text x="1000" y="61" font-size="19" font-weight="700">你安装的本地 Skills</text>
    <text x="1000" y="84" font-size="12" fill="#557979">实际名称来自你的本地 Skill 文件夹</text>
  </g>

  <g font-family="Noto Sans SC, Microsoft YaHei UI, sans-serif" font-size="17" font-weight="700" text-anchor="middle" fill="#0F4C4E">
    <g transform="translate(70 105)">
      <rect width="260" height="62" rx="8" fill="#DDF8F8" stroke="#0F4C4E" stroke-width="2.5"/>
      <circle cx="28" cy="31" r="10" fill="#52C9CE" stroke="none"/>
      <text x="145" y="38">范围 / 调研</text>
    </g>
    <g transform="translate(70 190)">
      <rect width="260" height="62" rx="8" fill="#FBE5E1" stroke="#0F4C4E" stroke-width="2.5"/>
      <circle cx="28" cy="31" r="10" fill="#E88E7D" stroke="none"/>
      <text x="145" y="38">实现 / 修改</text>
    </g>
    <g transform="translate(70 275)">
      <rect width="260" height="62" rx="8" fill="#E5F3EB" stroke="#0F4C4E" stroke-width="2.5"/>
      <circle cx="28" cy="31" r="10" fill="#75B89B" stroke="none"/>
      <text x="145" y="38">测试 / 审查</text>
    </g>
    <g transform="translate(70 360)">
      <rect width="260" height="62" rx="8" fill="#FFF3D5" stroke="#0F4C4E" stroke-width="2.5"/>
      <circle cx="28" cy="31" r="10" fill="#E7B94F" stroke="none"/>
      <text x="145" y="38">文档 / 交付</text>
    </g>
  </g>

  <g fill="none" stroke-width="4" stroke-linecap="round">
    <path d="M330 136 C500 136 700 134 880 134" stroke="#52C9CE"/>
    <path d="M330 221 C500 221 700 284 880 284" stroke="#E88E7D"/>
    <path d="M330 306 C500 306 700 209 880 209" stroke="#75B89B"/>
    <path d="M330 391 C415 391 452 411 520 411" stroke="#D2A233" stroke-dasharray="9 8"/>
  </g>

  <g fill="#FAFBF7" stroke-width="3">
    <circle cx="330" cy="136" r="6" stroke="#52C9CE"/>
    <circle cx="880" cy="134" r="6" stroke="#52C9CE"/>
    <circle cx="330" cy="221" r="6" stroke="#E88E7D"/>
    <circle cx="880" cy="284" r="6" stroke="#E88E7D"/>
    <circle cx="330" cy="306" r="6" stroke="#75B89B"/>
    <circle cx="880" cy="209" r="6" stroke="#75B89B"/>
    <circle cx="330" cy="391" r="6" stroke="#D2A233"/>
    <circle cx="520" cy="411" r="6" stroke="#D2A233"/>
  </g>

  <g font-family="Noto Sans SC, Microsoft YaHei UI, sans-serif" text-anchor="middle" fill="#0F4C4E">
    <g transform="translate(880 105)">
      <rect width="240" height="58" rx="8" fill="#A7EEF0" stroke="#0F4C4E" stroke-width="2.5"/>
      <text x="120" y="36" font-size="16" font-weight="700">调研类 Skill</text>
    </g>
    <g transform="translate(880 180)">
      <rect width="240" height="58" rx="8" fill="#B9DEC9" stroke="#0F4C4E" stroke-width="2.5"/>
      <text x="120" y="36" font-size="16" font-weight="700">测试类 Skill</text>
    </g>
    <g transform="translate(880 255)">
      <rect width="240" height="58" rx="8" fill="#F2B2A5" stroke="#0F4C4E" stroke-width="2.5"/>
      <text x="120" y="36" font-size="16" font-weight="700">实现类 Skill</text>
    </g>
    <g transform="translate(880 330)">
      <rect width="240" height="58" rx="8" fill="#FFFFFF" stroke="#AFC3C0" stroke-width="2.5" stroke-dasharray="7 6"/>
      <text x="120" y="26" font-size="15" font-weight="700" fill="#557979">写作类 Skill</text>
      <text x="120" y="45" font-size="12" fill="#789393">本次没有使用</text>
    </g>
    <g transform="translate(880 405)">
      <rect width="240" height="58" rx="8" fill="#FFFFFF" stroke="#AFC3C0" stroke-width="2.5" stroke-dasharray="7 6"/>
      <text x="120" y="26" font-size="15" font-weight="700" fill="#557979">其他本地 Skill</text>
      <text x="120" y="45" font-size="12" fill="#789393">本次没有使用</text>
    </g>
  </g>

  <g transform="translate(520 380)">
    <rect width="160" height="62" rx="8" fill="#FFF7DB" stroke="#D2A233" stroke-width="2.5"/>
    <text x="80" y="29" fill="#0F4C4E" font-family="Noto Sans SC, Microsoft YaHei UI, sans-serif" font-size="16" font-weight="700" text-anchor="middle">当前 AI</text>
    <text x="80" y="49" fill="#6B7F74" font-family="Noto Sans SC, Microsoft YaHei UI, sans-serif" font-size="12" text-anchor="middle">继续完成这部分</text>
  </g>

  <text x="600" y="506" fill="#0F4C4E" font-family="Noto Sans SC, Microsoft YaHei UI, sans-serif" font-size="15" font-weight="600" text-anchor="middle">只选择真正有帮助的 Skills；其他工作继续由当前 AI 完成。</text>
</svg>
